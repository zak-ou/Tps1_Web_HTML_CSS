<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscription - TP 2</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="form-container">
        <header>
            <h1>Créer un compte</h1>
            <p>Remplissez le formulaire ci-dessous pour vous inscrire.</p>
        </header>

        <form action="#" method="POST" enctype="multipart/form-data">

            <!-- Informations Personnelles -->
            <fieldset>
                <legend>Informations Personnelles</legend>

                <div class="form-group row">
                    <div class="col">
                        <label for="prenom">Prénom *</label>
                        <input type="text" id="prenom" name="prenom" required autocomplete="given-name" placeholder="Zakaria">
                    </div>
                    <div class="col">
                        <label for="nom">Nom *</label>
                        <input type="text" id="nom" name="nom" required autocomplete="family-name" placeholder="OUBAIH">
                    </div>
                </div>

                <div class="form-group">
                    <label for="email">Email *</label>
                    <input type="email" id="email" name="email" required autocomplete="email" placeholder="exemple@gmail.com">
                </div>

                <div class="form-group">
                    <label for="telephone">Téléphone *</label>
                    <input type="tel" id="telephone" name="telephone"
                           pattern="^0[1-9]([-. ]?[0-9]{2}){4}$"
                           title="Format : 10 chiffres commençant par 0"
                           required autocomplete="tel" placeholder="06 75 04 90 77">
                </div>

                <div class="form-group">
                    <label for="dob">Date de naissance *</label>
                    <input type="date" id="dob" name="dob" max="2008-03-16" required autocomplete="bday">
                    <span class="helper-text">Vous devez avoir au moins 18 ans.</span>
                </div>

                <div class="form-group">
                    <label>Genre *</label>
                    <div class="radio-group">
                        <label><input type="radio" name="genre" value="homme" required> Homme</label>
                        <label><input type="radio" name="genre" value="femme"> Femme</label>
                    </div>
                </div>
            </fieldset>

            <!-- Sécurité -->
            <fieldset>
                <legend>Sécurité du Compte</legend>

                <div class="form-group">
                    <label for="pwd">Mot de passe *</label>
                    <input type="password" id="pwd" name="pwd" required autocomplete="new-password"
                           pattern="(?=.*\d)(?=.*[A-Z]).{8,}"
                           title="Min 8 caractères, 1 majuscule, 1 chiffre"
                           placeholder="••••••••">
                    <span class="helper-text">Min 8 caractères, 1 majuscule, 1 chiffre</span>
                </div>

                <div class="form-group">
                    <label for="pwd_confirm">Confirmation du mot de passe *</label>
                    <input type="password" id="pwd_confirm" name="pwd_confirm" required autocomplete="new-password" placeholder="••••••••">
                </div>
            </fieldset>

            <!-- Profil -->
            <fieldset>
                <legend>Profil &amp; Préférences</legend>

                <div class="form-group">
                    <label for="pays">Pays *</label>
                    <input list="pays_list" id="pays" name="pays" required autocomplete="country" placeholder="Sélectionnez un pays...">
                    <datalist id="pays_list">
                        <option value="Maroc">
                        <option value="Belgique">
                        <option value="Suisse">
                        <option value="Canada">
                        <option value="France">
                    </datalist>
                </div>

                <div class="form-group">
                    <label>Centres d'intérêt</label>
                    <div class="checkbox-group">
                        <label><input type="checkbox" name="interets" value="technologie"> Technologie</label>
                        <label><input type="checkbox" name="interets" value="sport"> Sport</label>
                        <label><input type="checkbox" name="interets" value="musique"> Musique</label>
                        <label><input type="checkbox" name="interets" value="art"> Art &amp; Design</label>
                    </div>
                </div>

                <div class="form-group">
                    <label for="bio">Biographie</label>
                    <textarea id="bio" name="bio" rows="4" maxlength="500" placeholder="Décrivez-vous..."></textarea>
                </div>

                <div class="form-group">
                    <label for="photo">Photo de profil</label>
                    <input type="file" id="photo" name="photo" accept="image/*">
                </div>
            </fieldset>

            <div class="form-group checkbox-cgu">
                <label>
                    <input type="checkbox" name="cgu" required>
                    J'accepte les Conditions Générales d'Utilisation *
                </label>
            </div>

            <button type="submit" class="submit-btn">S'inscrire</button>

        </form>
    </div>
</body>
</html>
